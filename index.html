<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Piyush Medikeri</title>
  <meta name="description" content="Website under construction.">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #faf9f5;
      color: #1a1a1a;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      line-height: 1.6;
    }
    main {
      max-width: 640px;
      text-align: center;
    }
    h1 {
      font-size: clamp(2.5rem, 6vw, 3.75rem);
      font-weight: 600;
      margin-bottom: 1.25rem;
      letter-spacing: -0.02em;
    }
    p {
      color: #555;
      font-size: 1.125rem;
      margin-bottom: 2rem;
    }
    .dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      background: #d97706;
      border-radius: 50%;
      margin-right: 8px;
      vertical-align: middle;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.35; }
    }
    .meta {
      font-size: 0.875rem;
      color: #999;
      margin-top: 3rem;
    }
  </style>
</head>
<body>
  <main>
    <h1>Piyush Medikeri</h1>
    <p><span class="dot"></span>Website under construction.</p>
    <div class="meta">piyushmedikeri.com</div>
  </main>
</body>
</html>
