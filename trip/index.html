<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Trip Planner</title>
<meta name="color-scheme" content="light">
<style>
  :root{
    --bg:#faf9f5; --ink:#1a1a1a; --muted:#6b6b6b; --faint:#9a968c; --line:#e7e4dc;
    --card:#ffffff; --shadow:0 1px 3px rgba(0,0,0,.06),0 6px 20px rgba(0,0,0,.05);
    --radius:16px; --accent:#d97706; --today:#fff7ec;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html{-webkit-text-size-adjust:100%}
  body{
    background:var(--bg); color:var(--ink); line-height:1.5;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    padding:clamp(1rem,3vw,2.25rem) clamp(1rem,3vw,2.25rem) 4rem;
  }
  .wrap{max-width:1240px;margin:0 auto}

  /* ---- header / toolbar ---- */
  header{display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:1rem;margin-bottom:1.1rem}
  header h1{font-size:clamp(1.4rem,3.5vw,2rem);font-weight:700;letter-spacing:-.02em;display:flex;align-items:center;gap:.55rem}
  header h1 .dot{width:10px;height:10px;border-radius:50%;background:var(--accent)}
  .stat{font-size:.85rem;color:var(--muted);font-weight:500}
  .stat b{color:var(--ink)}

  .toolbar{display:flex;flex-wrap:wrap;align-items:center;gap:.6rem;margin-bottom:1.2rem}
  .nav{display:flex;align-items:center;gap:.35rem}
  .btn{border:1px solid var(--line);background:var(--card);color:var(--ink);
    border-radius:10px;padding:.5rem .8rem;font-size:.9rem;cursor:pointer;
    font-family:inherit;transition:.15s;display:inline-flex;align-items:center;gap:.4rem;white-space:nowrap}
  .btn:hover{border-color:var(--accent);color:var(--accent)}
  .btn.icon{padding:.5rem .65rem;font-size:1rem;line-height:1}
  .btn.solid{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}
  .btn.solid:hover{background:#c26905;color:#fff}
  .month-label{font-size:1.15rem;font-weight:700;min-width:11rem;text-align:center;letter-spacing:-.01em}
  .spacer{flex:1}
  .toolbar .right{display:flex;gap:.5rem;flex-wrap:wrap;align-items:center}

  .syncpill{display:inline-flex;align-items:center;gap:.4rem;font-size:.78rem;color:var(--muted);
    border:1px solid var(--line);border-radius:20px;padding:.32rem .62rem;font-weight:600;cursor:default}
  .syncpill .d{width:8px;height:8px;border-radius:50%;background:#bbb;flex:0 0 auto}
  .syncpill.ok .d{background:#16a34a}
  .syncpill.off .d{background:#ea580c}
  .syncpill.sync .d{background:var(--accent);animation:blip 1s ease-in-out infinite}
  @keyframes blip{50%{opacity:.25}}

  /* legend */
  .legend{display:flex;flex-wrap:wrap;gap:.5rem .9rem;margin:0 0 .9rem}
  .legend span{display:inline-flex;align-items:center;gap:.4rem;font-size:.8rem;color:var(--muted)}
  .legend .swatch{width:11px;height:11px;border-radius:3px;flex:0 0 auto}

  /* ---- layout: calendar + sidebar ---- */
  .layout{display:grid;grid-template-columns:minmax(0,1fr) 310px;gap:1.25rem;align-items:start}
  @media(max-width:920px){.layout{grid-template-columns:1fr}}

  /* ---- calendar ---- */
  .cal{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    box-shadow:var(--shadow);padding:.6rem .6rem .75rem}
  .dow-row{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:2px}
  .dow{font-size:.68rem;font-weight:700;color:var(--faint);text-align:center;
    text-transform:uppercase;letter-spacing:.05em;padding:.25rem 0}
  .month{display:flex;flex-direction:column;gap:5px}
  .week{display:grid;grid-template-columns:repeat(7,1fr);position:relative}
  .daybg{grid-row:1/-1;margin:3px;border:1px solid var(--line);border-radius:10px;
    background:#fbfaf7;position:relative;cursor:pointer;z-index:0;
    transition:box-shadow .12s ease,border-color .12s ease}
  .daybg:hover{box-shadow:0 3px 12px rgba(0,0,0,.08);border-color:#d8d4c8}
  .daybg.today{background:var(--today);border-color:#f3d9a8}
  .daybg .num{position:absolute;top:4px;left:5px;font-size:.8rem;font-weight:600;color:var(--muted);
    width:1.4rem;height:1.4rem;display:flex;align-items:center;justify-content:center}
  .daybg.today .num{background:var(--accent);color:#fff;border-radius:50%}
  .daybg .add{position:absolute;top:5px;right:5px;opacity:0;border:none;background:transparent;
    color:var(--faint);font-size:1.05rem;cursor:pointer;line-height:1;padding:0 .15rem;transition:.12s}
  .daybg:hover .add{opacity:1}
  .daybg .add:hover{color:var(--accent)}

  .bar{margin:1px 5px;height:20px;border-radius:5px;display:flex;align-items:center;gap:4px;
    padding:0 6px;font-size:.7rem;line-height:1;cursor:pointer;position:relative;z-index:1;overflow:hidden}
  .bar .bx{width:11px;height:11px;border-radius:3px;border:1.5px solid currentColor;flex:0 0 auto;opacity:.85;position:relative}
  .bar .bt{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--ink)}
  .bar .arw{opacity:.7;flex:0 0 auto}
  .bar.done{opacity:.5}
  .bar.done .bt{text-decoration:line-through;color:var(--muted)}
  .bar.done .bx{background:currentColor}
  .bar.done .bx::after{content:"✓";position:absolute;inset:-3px 0 0 0;color:#fff;font-size:8px;text-align:center;line-height:11px}

  /* ---- sidebar ---- */
  .side{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    box-shadow:var(--shadow);padding:1rem 1rem 1.1rem;position:sticky;top:1rem;
    max-height:calc(100vh - 2rem);display:flex;flex-direction:column;min-height:0}
  .side-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:.6rem}
  .side-head h2{font-size:1.05rem;font-weight:700;letter-spacing:-.01em}
  .side-count{font-size:.8rem;color:var(--muted)}
  .side-list{overflow:auto;margin:0 -.35rem;padding:0 .35rem}
  .side-list:empty::after{content:"No events this month yet.\A Click a day to add one.";white-space:pre-line;
    color:var(--faint);font-size:.88rem;font-style:italic;display:block;padding:.5rem 0}
  .side-item{display:flex;gap:.55rem;padding:.5rem .4rem;border-radius:10px;cursor:pointer;align-items:flex-start}
  .side-item:hover{background:#f7f5f0}
  .side-item + .side-item{border-top:1px solid #f2efe8}
  .side-check{width:18px;height:18px;border-radius:5px;border:2px solid var(--faint);flex:0 0 auto;
    margin-top:1px;cursor:pointer;position:relative;transition:.12s}
  .side-check:hover{border-color:var(--accent)}
  .side-item.done .side-check{background:var(--accent);border-color:var(--accent)}
  .side-item.done .side-check::after{content:"✓";position:absolute;inset:0;color:#fff;font-size:12px;text-align:center;line-height:15px}
  .side-item .sd{flex:0 0 auto;width:2.9rem;text-align:center;padding-top:1px}
  .side-item .sd .dd{font-weight:700;font-size:1rem;line-height:1}
  .side-item .sd .mm{font-size:.6rem;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
  .side-item .si{flex:1;min-width:0}
  .side-item .si .st{font-weight:600;font-size:.9rem;word-break:break-word}
  .side-item.done .si .st{text-decoration:line-through;color:var(--muted)}
  .side-item .si .sm{font-size:.75rem;color:var(--muted);margin-top:1px;display:flex;align-items:center;gap:.35rem;flex-wrap:wrap}
  .side-item .si .cdot{width:8px;height:8px;border-radius:50%;flex:0 0 auto}
  .side-item .si .range{color:var(--accent);font-weight:600}

  footer{text-align:center;color:#b3aea3;font-size:.8rem;margin-top:2rem}

  /* ---- day modal ---- */
  .modal{position:fixed;inset:0;background:rgba(20,18,14,.45);display:none;
    align-items:flex-end;justify-content:center;z-index:70}
  .modal.open{display:flex}
  @media(min-width:620px){.modal{align-items:center;padding:1.25rem}}
  .sheet{background:#fff;border-radius:20px 20px 0 0;max-width:520px;width:100%;
    padding:1.4rem 1.4rem 1.6rem;box-shadow:0 -8px 40px rgba(0,0,0,.2);max-height:90vh;overflow:auto}
  @media(min-width:620px){.sheet{border-radius:20px}}
  .sheet-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:1rem}
  .sheet-head h3{font-size:1.25rem;font-weight:700;letter-spacing:-.01em}
  .sheet-head .sub{color:var(--muted);font-size:.85rem;margin-top:1px}
  .close{border:none;background:#f0efea;width:32px;height:32px;border-radius:50%;
    cursor:pointer;font-size:1rem;color:#666;line-height:1;flex:0 0 auto}
  .close:hover{background:#e6e4dc}

  .act-list{display:flex;flex-direction:column;gap:.5rem;margin-bottom:1.1rem}
  .act-list:empty::after{content:"Nothing on this day yet — add something below.";color:var(--faint);font-size:.9rem;font-style:italic}
  .act{display:flex;align-items:flex-start;gap:.65rem;padding:.6rem .7rem;border:1px solid var(--line);
    border-radius:12px;border-left:4px solid var(--faint);background:#fdfcfa}
  .act .check{width:20px;height:20px;border-radius:6px;border:2px solid var(--faint);
    flex:0 0 auto;cursor:pointer;margin-top:1px;position:relative;transition:.12s}
  .act .check:hover{border-color:var(--accent)}
  .act.done .check{background:var(--accent);border-color:var(--accent)}
  .act.done .check::after{content:"✓";position:absolute;inset:0;color:#fff;font-size:13px;text-align:center;line-height:16px}
  .act .body{flex:1;min-width:0}
  .act .t{font-weight:600;font-size:.95rem;word-break:break-word}
  .act.done .t{text-decoration:line-through;color:var(--muted)}
  .act .meta{font-size:.8rem;color:var(--muted);margin-top:1px}
  .act .meta .cat{font-weight:600}
  .act .meta .range{color:var(--accent);font-weight:600}
  .act .note{font-size:.82rem;color:#555;margin-top:2px;word-break:break-word}
  .act .ops{display:flex;gap:.2rem;flex:0 0 auto}
  .iconbtn{border:none;background:transparent;color:var(--faint);cursor:pointer;
    padding:.25rem;border-radius:7px;font-size:.85rem;line-height:1}
  .iconbtn:hover{background:#f0efea;color:var(--ink)}

  /* add/edit form */
  .form{border-top:1px dashed var(--line);padding-top:1rem}
  .form .row{display:flex;gap:.5rem;margin-bottom:.55rem;flex-wrap:wrap;align-items:center}
  .form input[type=text],.form textarea,.form select,.form input[type=time],.form input[type=date]{
    font-family:inherit;font-size:.9rem;border:1px solid var(--line);border-radius:10px;
    padding:.55rem .7rem;color:var(--ink);background:#fff}
  .form input[type=text].title-in{flex:1;min-width:100%;width:100%}
  .form textarea{resize:vertical;min-height:2.4rem;width:100%}
  .form input:focus,.form textarea:focus,.form select:focus{outline:none;border-color:var(--accent)}
  .form .cat-in{flex:1;min-width:8rem}
  .form .time-in{flex:0 0 auto;width:7rem}
  .form .daterow label{display:inline-flex;align-items:center;gap:.4rem;font-size:.85rem;color:var(--muted)}
  .form .daterow input[type=date]{width:9.5rem}
  .form .actions{display:flex;gap:.5rem;justify-content:flex-end;margin-top:.4rem}
  .form-title{font-size:.8rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--faint);margin-bottom:.6rem}

  .toast{position:fixed;bottom:1.2rem;left:50%;transform:translateX(-50%) translateY(2rem);
    background:#1a1a1a;color:#fff;padding:.6rem 1rem;border-radius:10px;font-size:.85rem;
    opacity:0;transition:.25s;z-index:90;pointer-events:none}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  input[type=file]{display:none}

  /* ---- password gate ---- */
  .gate{position:fixed;inset:0;z-index:200;background:var(--bg);display:flex;align-items:center;justify-content:center;padding:1.5rem}
  .gate.hide{display:none}
  .gate .card{max-width:340px;width:100%;text-align:center}
  .gate .lock{font-size:2.2rem}
  .gate h2{font-size:1.5rem;font-weight:700;margin:.4rem 0 .25rem;letter-spacing:-.01em}
  .gate p{color:var(--muted);font-size:.9rem;margin-bottom:1.3rem}
  .gate input{width:100%;padding:.75rem .9rem;border:1px solid var(--line);border-radius:12px;
    font-size:1.05rem;text-align:center;letter-spacing:.12em;background:#fff;color:var(--ink)}
  .gate input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(217,119,6,.12)}
  .gate button{margin-top:.7rem;width:100%;padding:.75rem;border:none;border-radius:12px;
    background:var(--accent);color:#fff;font-weight:600;font-size:.95rem;cursor:pointer;transition:.15s}
  .gate button:hover{background:#c26905}
  .gate button:disabled{opacity:.6;cursor:default}
  .gate .err{color:#dc2626;font-size:.82rem;margin-top:.7rem;min-height:1.1rem}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1><span class="dot"></span>Trip Planner</h1>
    <div class="stat" id="stat"></div>
  </header>

  <div class="toolbar">
    <div class="nav">
      <button class="btn icon" id="prev" aria-label="Previous month">‹</button>
      <div class="month-label" id="monthLabel">—</div>
      <button class="btn icon" id="next" aria-label="Next month">›</button>
    </div>
    <button class="btn" id="today">Today</button>
    <div class="spacer"></div>
    <div class="right">
      <span class="syncpill" id="syncPill" title="Sync status"><span class="d"></span><span id="syncText">local</span></span>
      <button class="btn" id="exportBtn" title="Download a backup of all events">⬇ Export</button>
      <button class="btn" id="importBtn" title="Load events from a backup file">⬆ Import</button>
      <button class="btn icon" id="lockBtn" title="Lock / sign out">🔒</button>
      <input type="file" id="importFile" accept="application/json">
    </div>
  </div>

  <div class="legend" id="legend"></div>

  <div class="layout">
    <div class="cal">
      <div class="dow-row" id="dowRow"></div>
      <div class="month" id="month"></div>
    </div>

    <aside class="side">
      <div class="side-head"><h2 id="sideTitle">Events</h2><span class="side-count" id="sideCount"></span></div>
      <div class="side-list" id="sideList"></div>
    </aside>
  </div>

  <footer>
    Click a day to add an event · set a “to” date for multi-day events · click a ✓ box to mark done.<br>
    Shared with family &amp; synced across devices · changes save automatically.
  </footer>
</div>

<!-- day modal -->
<div class="modal" id="modal">
  <div class="sheet">
    <div class="sheet-head">
      <div>
        <h3 id="sheetTitle">Day</h3>
        <div class="sub" id="sheetSub"></div>
      </div>
      <button class="close" id="close" aria-label="Close">✕</button>
    </div>

    <div class="act-list" id="actList"></div>

    <div class="form">
      <div class="form-title" id="formTitle">Add event</div>
      <div class="row">
        <input type="text" class="title-in" id="fTitle" placeholder="What needs to be done?" autocomplete="off">
      </div>
      <div class="row">
        <select class="cat-in" id="fCat"></select>
        <input type="time" class="time-in" id="fTime" title="Optional time">
      </div>
      <div class="row daterow">
        <label>From <input type="date" id="fStart"></label>
        <label>to <input type="date" id="fEnd"></label>
      </div>
      <div class="row">
        <textarea id="fNote" placeholder="Notes (optional)"></textarea>
      </div>
      <div class="actions">
        <button class="btn" id="fCancel" style="display:none">Cancel</button>
        <button class="btn solid" id="fSave">Add</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- password gate -->
<div class="gate" id="gate">
  <div class="card">
    <div class="lock">🔒</div>
    <h2>Trip Planner</h2>
    <p>Enter the family password to view and edit the trip.</p>
    <input type="password" id="gatePass" placeholder="Password" autocomplete="current-password" autofocus>
    <button id="gateBtn">Unlock</button>
    <div class="err" id="gateErr"></div>
  </div>
</div>

<script>
(function(){
  "use strict";
  var STORE_KEY = 'activity-planner-v1';
  var PASS_KEY  = 'trip-pass';
  var SYNC_URL  = localStorage.getItem('trip-sync-url') || 'https://spark-5d2c.tail824731.ts.net/api/trip';

  var CATS = [
    {id:'work',     label:'Work',     c:'#2563eb'},
    {id:'personal', label:'Personal', c:'#16a34a'},
    {id:'errand',   label:'Errand',   c:'#ea580c'},
    {id:'health',   label:'Health',   c:'#db2777'},
    {id:'event',    label:'Event',    c:'#7c3aed'},
    {id:'other',    label:'Other',    c:'#64748b'}
  ];
  var CATMAP = {}; CATS.forEach(function(c){CATMAP[c.id]=c;});
  function catOf(id){ return CATMAP[id]||CATMAP.other; }
  var MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  var MSHORT = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  var DOW = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

  // ---------- state ----------
  var store = load();
  var now = new Date();
  var viewY = now.getFullYear(), viewM = now.getMonth();
  var openKey = null, editingId = null;
  var pass = localStorage.getItem(PASS_KEY) || null;
  var lastRev = -1, pollTimer = null, pushTimer = null, pushing = false;

  function load(){
    try{ var raw = localStorage.getItem(STORE_KEY);
      if(raw){ var o = JSON.parse(raw);
        if(o && o.version===2 && Array.isArray(o.events)) return o;
        if(o && o.activities){ var evs=[]; Object.keys(o.activities).forEach(function(k){
            (o.activities[k]||[]).forEach(function(e){ evs.push({id:e.id||uid(),title:e.title,cat:e.cat||'other',start:k,end:k,time:e.time||'',note:e.note||'',done:!!e.done,updatedAt:1}); }); });
          return {version:2, events:evs};
        }
      }
    }catch(e){}
    return {version:2, events:[]};
  }
  function saveLocal(){ try{ localStorage.setItem(STORE_KEY, JSON.stringify(store)); }catch(e){ toast('Could not save locally'); } }
  function uid(){ return 'a'+Date.now().toString(36)+Math.floor(Math.random()*1e5).toString(36); }
  function nowMs(){ return Date.now(); }
  function pad2(n){ return (n<10?'0':'')+n; }
  function keyOf(d){ return d.getFullYear()+'-'+pad2(d.getMonth()+1)+'-'+pad2(d.getDate()); }
  function parseKey(k){ var p=k.split('-'); return new Date(+p[0],+p[1]-1,+p[2]); }
  function dayDiff(a,b){ return Math.round((new Date(b.getFullYear(),b.getMonth(),b.getDate()) - new Date(a.getFullYear(),a.getMonth(),a.getDate()))/86400000); }
  function todayKey(){ return keyOf(new Date()); }
  function evEnd(e){ return (e.end && e.end>=e.start) ? e.end : e.start; }
  function live(){ return store.events.filter(function(e){ return !e.deleted; }); }
  function eventsBetween(a,b){ return store.events.filter(function(e){ return !e.deleted && e.start<=b && evEnd(e)>=a; }); }
  function eventsOnDay(k){ return eventsBetween(k,k); }

  // ---------- merge (by id, newest updatedAt wins; tombstones included) ----------
  function mergeInto(remoteEvents){
    var map={};
    store.events.forEach(function(e){ map[e.id]=e; });
    remoteEvents.forEach(function(e){
      if(!e||!e.id) return;
      var cur=map[e.id];
      if(!cur || (cur.updatedAt||0) <= (e.updatedAt||0)) map[e.id]=e;
    });
    store.events = Object.keys(map).map(function(k){ return map[k]; });
  }

  // ---------- sync ----------
  var syncPill=document.getElementById('syncPill'), syncText=document.getElementById('syncText');
  function setSync(state){ // 'ok' | 'off' | 'sync' | 'local'
    syncPill.className='syncpill'+(state==='ok'?' ok':state==='off'?' off':state==='sync'?' sync':'');
    syncText.textContent = state==='ok'?'synced':state==='off'?'offline':state==='sync'?'syncing…':'local';
  }
  function apiGET(){
    return fetch(SYNC_URL,{headers:{'Authorization':'Bearer '+pass}}).then(function(r){
      if(r.status===401){ var e=new Error('unauthorized'); e.code=401; throw e; }
      if(!r.ok) throw new Error('http '+r.status);
      return r.json();
    });
  }
  function apiPOST(){
    return fetch(SYNC_URL,{method:'POST',headers:{'Authorization':'Bearer '+pass,'Content-Type':'application/json'},
      body:JSON.stringify({events:store.events})}).then(function(r){
      if(r.status===401){ var e=new Error('unauthorized'); e.code=401; throw e; }
      if(!r.ok) throw new Error('http '+r.status);
      return r.json();
    });
  }
  function adopt(doc){
    if(doc && Array.isArray(doc.events)){ mergeInto(doc.events); lastRev=doc.rev; saveLocal(); render(); if(modal.classList.contains('open')) renderActList(); }
  }
  function pushNow(){
    if(!pass) return;
    pushing=true; setSync('sync');
    apiPOST().then(function(doc){ adopt(doc); pushing=false; setSync('ok'); })
      .catch(function(err){ pushing=false; if(err.code===401){ handleAuthLost(); } else setSync('off'); });
  }
  function schedulePush(){
    if(!pass) return;
    clearTimeout(pushTimer);
    pushTimer=setTimeout(pushNow, 700);
  }
  function poll(){
    if(!pass || pushing) return;
    apiGET().then(function(doc){ if(doc.rev!==lastRev) adopt(doc); setSync('ok'); })
      .catch(function(err){ if(err.code===401){ handleAuthLost(); } else setSync('off'); });
  }
  function startSync(){
    if(!pass){ setSync('local'); return; }
    setSync('sync');
    // initial: upload local + pull others in one merge
    apiPOST().then(function(doc){ adopt(doc); setSync('ok'); })
      .catch(function(err){ if(err.code===401){ handleAuthLost(); } else setSync('off'); });
    clearInterval(pollTimer);
    pollTimer=setInterval(poll, 15000);
    window.addEventListener('online', pushNow);
  }
  function handleAuthLost(){
    setSync('off');
    // password no longer valid — force re-entry
    localStorage.removeItem(PASS_KEY); pass=null; clearInterval(pollTimer);
    showGate('Password changed — please re-enter.');
  }

  // ---------- password gate ----------
  var gate=document.getElementById('gate'), gatePass=document.getElementById('gatePass'),
      gateBtn=document.getElementById('gateBtn'), gateErr=document.getElementById('gateErr');
  function showGate(msg){ gate.classList.remove('hide'); gateErr.textContent=msg||''; gatePass.value=''; setTimeout(function(){gatePass.focus();},50); }
  function hideGate(){ gate.classList.add('hide'); }
  function tryUnlock(candidate){
    gateBtn.disabled=true; gateErr.textContent='Checking…';
    var prev=pass; pass=candidate;
    apiGET().then(function(doc){
      localStorage.setItem(PASS_KEY, candidate); gateBtn.disabled=false; gateErr.textContent='';
      hideGate(); adopt(doc); setSync('ok');
      clearInterval(pollTimer); pollTimer=setInterval(poll,15000);
      window.addEventListener('online', pushNow);
    }).catch(function(err){
      gateBtn.disabled=false;
      if(err.code===401){ pass=prev; gateErr.textContent='Wrong password. Try again.'; }
      else {
        // server unreachable — allow entry if this matches a previously saved password (offline mode)
        if(localStorage.getItem(PASS_KEY)===candidate){ hideGate(); setSync('off'); startSync(); }
        else { pass=prev; gateErr.textContent='Can’t reach the sync server. Check connection and retry.'; }
      }
    });
  }
  gateBtn.addEventListener('click',function(){ var v=gatePass.value.trim(); if(v) tryUnlock(v); });
  gatePass.addEventListener('keydown',function(e){ if(e.key==='Enter'){ var v=gatePass.value.trim(); if(v) tryUnlock(v); } });
  document.getElementById('lockBtn').addEventListener('click',function(){
    localStorage.removeItem(PASS_KEY); pass=null; clearInterval(pollTimer); setSync('local'); showGate('');
  });

  // ---------- legend / weekday / category select ----------
  var legend = document.getElementById('legend');
  CATS.forEach(function(c){ var s=document.createElement('span'); s.innerHTML='<span class="swatch" style="background:'+c.c+'"></span>'+c.label; legend.appendChild(s); });
  var dowRow = document.getElementById('dowRow');
  DOW.forEach(function(d){ var el=document.createElement('div'); el.className='dow'; el.textContent=d; dowRow.appendChild(el); });
  var fCat = document.getElementById('fCat');
  CATS.forEach(function(c){ var o=document.createElement('option'); o.value=c.id; o.textContent=c.label; fCat.appendChild(o); });

  // ---------- render calendar ----------
  var monthEl = document.getElementById('month');
  var monthLabel = document.getElementById('monthLabel');
  var statEl = document.getElementById('stat');

  function render(){
    monthLabel.textContent = MONTHS[viewM]+' '+viewY;
    monthEl.innerHTML='';
    var first = new Date(viewY,viewM,1).getDay();
    var days  = new Date(viewY,viewM+1,0).getDate();
    var monthStartKey = keyOf(new Date(viewY,viewM,1));
    var monthEndKey   = keyOf(new Date(viewY,viewM,days));
    var tKey = todayKey();

    var cells=[];
    for(var i=0;i<first;i++) cells.push(null);
    for(var d=1;d<=days;d++) cells.push({day:d,date:new Date(viewY,viewM,d),key:keyOf(new Date(viewY,viewM,d))});
    while(cells.length%7!==0) cells.push(null);

    for(var w=0; w<cells.length/7; w++){
      var slice = cells.slice(w*7,w*7+7);
      var realDays = slice.map(function(c,idx){return c?{c:c,col:idx}:null;}).filter(Boolean);
      var week=document.createElement('div'); week.className='week';

      realDays.forEach(function(rd){
        var bg=document.createElement('div');
        bg.className='daybg'+(rd.c.key===tKey?' today':'');
        bg.style.gridColumn=(rd.col+1)+' / '+(rd.col+2);
        bg.innerHTML='<span class="num">'+rd.c.day+'</span><button class="add" aria-label="Add event">+</button>';
        bg.addEventListener('click',(function(k){return function(){ openDay(k); };})(rd.c.key));
        week.appendChild(bg);
      });

      var lanes=[];
      if(realDays.length){
        var wsDate=realDays[0].c.date, weDate=realDays[realDays.length-1].c.date;
        var wsKey=realDays[0].c.key,  weKey=realDays[realDays.length-1].c.key;
        var firstCol=realDays[0].col;
        var weekEvs = eventsBetween(wsKey,weKey).slice().sort(function(a,b){
          if(a.start!==b.start) return a.start<b.start?-1:1;
          return (evEnd(b)>evEnd(a)?1:-1);
        });
        weekEvs.forEach(function(e){
          var s = e.start<wsKey ? wsDate : parseKey(e.start);
          var en= evEnd(e)>weKey ? weDate : parseKey(evEnd(e));
          var sCol = firstCol + dayDiff(wsDate,s);
          var eCol = firstCol + dayDiff(wsDate,en);
          var lane=0; while(lane<lanes.length && lanes[lane]>=sCol) lane++;
          lanes[lane]=eCol;
          var cat=catOf(e.cat);
          var bar=document.createElement('div');
          bar.className='bar'+(e.done?' done':'');
          bar.style.gridColumn=(sCol+1)+' / '+(eCol+2);
          bar.style.gridRow=(lane+2);
          bar.style.background=cat.c+'22';
          bar.style.color=cat.c;
          var leftA = e.start<wsKey ? '<span class="arw">‹</span>' : '';
          var rightA= evEnd(e)>weKey ? '<span class="arw">›</span>' : '';
          var tm = e.time && e.start>=wsKey ? '<b style="color:'+cat.c+'">'+fmtTime(e.time)+'</b> ' : '';
          bar.innerHTML='<span class="bx"></span>'+leftA+'<span class="bt">'+tm+esc(e.title)+'</span>'+rightA;
          bar.title=e.title+(e.end&&e.end!==e.start?' ('+fmtShort(e.start)+' – '+fmtShort(evEnd(e))+')':'');
          bar.querySelector('.bx').addEventListener('click',(function(id){return function(ev){ev.stopPropagation();toggleDone(id);};})(e.id));
          bar.addEventListener('click',(function(sk){return function(ev){ev.stopPropagation();openDay(sk);};})(e.start<wsKey?wsKey:e.start));
          week.appendChild(bar);
        });
      }
      var laneRows=Math.max(lanes.length,2);
      week.style.gridTemplateRows='28px repeat('+laneRows+',22px) 5px';
      monthEl.appendChild(week);
    }

    renderStat(monthStartKey,monthEndKey);
    renderSide(monthStartKey,monthEndKey);
  }

  function renderStat(a,b){
    var pend=0,done=0;
    eventsBetween(a,b).forEach(function(e){ e.done?done++:pend++; });
    statEl.innerHTML = (pend+done===0) ? 'Nothing planned this month yet'
      : '<b>'+pend+'</b> to do · <b>'+done+'</b> done this month';
  }

  // ---------- sidebar ----------
  var sideList=document.getElementById('sideList'), sideTitle=document.getElementById('sideTitle'), sideCount=document.getElementById('sideCount');
  function renderSide(a,b){
    sideTitle.textContent = MONTHS[viewM]+' '+viewY;
    var evs = eventsBetween(a,b).slice().sort(function(x,y){
      if(x.start!==y.start) return x.start<y.start?-1:1;
      return (x.time||'~').localeCompare(y.time||'~');
    });
    sideCount.textContent = evs.length ? evs.length+(evs.length>1?' events':' event') : '';
    sideList.innerHTML='';
    evs.forEach(function(e){
      var cat=catOf(e.cat); var sd=parseKey(e.start), multi=(e.end&&e.end!==e.start);
      var item=document.createElement('div'); item.className='side-item'+(e.done?' done':'');
      var meta=[]; if(e.time) meta.push(fmtTime(e.time));
      meta.push('<span class="cdot" style="background:'+cat.c+'"></span>'+cat.label);
      if(multi) meta.push('<span class="range">→ '+fmtShort(evEnd(e))+'</span>');
      item.innerHTML='<div class="side-check"></div>'+
        '<div class="sd"><div class="dd">'+sd.getDate()+'</div><div class="mm">'+MSHORT[sd.getMonth()]+'</div></div>'+
        '<div class="si"><div class="st">'+esc(e.title)+'</div><div class="sm">'+meta.join(' · ')+'</div></div>';
      item.querySelector('.side-check').addEventListener('click',function(ev){ev.stopPropagation();toggleDone(e.id);});
      item.addEventListener('click',function(){ openDay(e.start); });
      sideList.appendChild(item);
    });
  }

  // ---------- day modal ----------
  var modal=document.getElementById('modal'), sheetTitle=document.getElementById('sheetTitle'),
      sheetSub=document.getElementById('sheetSub'), actListEl=document.getElementById('actList');
  function openDay(k){
    openKey=k; resetForm(k);
    var d=parseKey(k);
    sheetTitle.textContent = DOW[d.getDay()]+', '+MONTHS[d.getMonth()]+' '+d.getDate();
    renderActList(); modal.classList.add('open');
    setTimeout(function(){ document.getElementById('fTitle').focus(); }, 60);
  }
  function closeDay(){ modal.classList.remove('open'); openKey=null; }
  function renderActList(){
    var evs=eventsOnDay(openKey);
    var pend=evs.filter(function(e){return !e.done;}).length;
    sheetSub.textContent = evs.length===0 ? '' : pend+' to do · '+(evs.length-pend)+' done';
    actListEl.innerHTML='';
    evs.slice().sort(function(a,b){ if(!!a.done!==!!b.done) return a.done?1:-1; return (a.time||'~').localeCompare(b.time||'~'); }).forEach(function(e){
      var cat=catOf(e.cat);
      var el=document.createElement('div'); el.className='act'+(e.done?' done':''); el.style.borderLeftColor=cat.c;
      var meta=[]; if(e.time) meta.push(fmtTime(e.time));
      meta.push('<span class="cat" style="color:'+cat.c+'">'+cat.label+'</span>');
      if(e.end && e.end!==e.start) meta.push('<span class="range">'+fmtShort(e.start)+' – '+fmtShort(evEnd(e))+'</span>');
      el.innerHTML='<div class="check"></div><div class="body"><div class="t">'+esc(e.title)+'</div>'+
        '<div class="meta">'+meta.join(' · ')+'</div>'+(e.note?'<div class="note">'+esc(e.note)+'</div>':'')+'</div>'+
        '<div class="ops"><button class="iconbtn edit" title="Edit">✎</button><button class="iconbtn del" title="Delete">🗑</button></div>';
      el.querySelector('.check').addEventListener('click',function(){ toggleDone(e.id); });
      el.querySelector('.edit').addEventListener('click',function(){ startEdit(e); });
      el.querySelector('.del').addEventListener('click',function(){ delEvent(e.id); });
      actListEl.appendChild(el);
    });
  }

  // ---------- form / CRUD ----------
  var fTitle=document.getElementById('fTitle'), fCatEl=document.getElementById('fCat'), fTime=document.getElementById('fTime'),
      fStart=document.getElementById('fStart'), fEnd=document.getElementById('fEnd'), fNote=document.getElementById('fNote'),
      fSave=document.getElementById('fSave'), fCancel=document.getElementById('fCancel'), formTitle=document.getElementById('formTitle');
  function resetForm(dayKey){
    editingId=null; fTitle.value=''; fCatEl.value='work'; fTime.value='';
    fStart.value=dayKey||openKey||todayKey(); fEnd.value=fStart.value; fNote.value='';
    fSave.textContent='Add'; formTitle.textContent='Add event'; fCancel.style.display='none';
  }
  function startEdit(e){
    editingId=e.id; fTitle.value=e.title; fCatEl.value=e.cat||'other'; fTime.value=e.time||'';
    fStart.value=e.start; fEnd.value=evEnd(e); fNote.value=e.note||'';
    fSave.textContent='Save'; formTitle.textContent='Edit event'; fCancel.style.display=''; fTitle.focus();
  }
  function commit(){
    var title=fTitle.value.trim(); if(!title){ fTitle.focus(); return; }
    var start=fStart.value || openKey || todayKey(); var end=fEnd.value || start; if(end<start) end=start;
    if(editingId){
      var e=store.events.find(function(x){return x.id===editingId;});
      if(e){ e.title=title; e.cat=fCatEl.value; e.time=fTime.value; e.start=start; e.end=end; e.note=fNote.value.trim(); e.updatedAt=nowMs(); }
      toast('Updated');
    } else {
      store.events.push({id:uid(),title:title,cat:fCatEl.value,time:fTime.value,start:start,end:end,note:fNote.value.trim(),done:false,updatedAt:nowMs()});
      toast(start===end?'Added':'Added (multi-day)');
    }
    saveLocal(); resetForm(openKey); renderActList(); render(); schedulePush();
  }
  function toggleDone(id){
    var e=store.events.find(function(x){return x.id===id;}); if(!e) return;
    e.done=!e.done; e.updatedAt=nowMs(); saveLocal();
    if(modal.classList.contains('open')) renderActList(); render(); schedulePush();
  }
  function delEvent(id){
    var e=store.events.find(function(x){return x.id===id;}); if(!e) return;
    e.deleted=true; e.updatedAt=nowMs(); saveLocal();
    if(editingId===id) resetForm(openKey); renderActList(); render(); schedulePush(); toast('Deleted');
  }

  // ---------- helpers ----------
  function esc(s){return String(s).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
  function fmtTime(t){ var p=String(t).split(':'); if(p.length<2) return t; var h=+p[0],m=p[1]; var ap=h>=12?'PM':'AM'; var hh=h%12; if(hh===0) hh=12; return hh+':'+m+' '+ap; }
  function fmtShort(k){ var d=parseKey(k); return MSHORT[d.getMonth()]+' '+d.getDate(); }
  var toastEl=document.getElementById('toast'), toastT;
  function toast(msg){ toastEl.textContent=msg; toastEl.classList.add('show'); clearTimeout(toastT); toastT=setTimeout(function(){toastEl.classList.remove('show');},1600); }

  // ---------- export / import ----------
  function exportData(){
    var blob=new Blob([JSON.stringify(store,null,2)],{type:'application/json'});
    var url=URL.createObjectURL(blob); var a=document.createElement('a');
    a.href=url; a.download='trip-planner-backup.json'; document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url); toast('Exported backup');
  }
  function importData(file){
    var r=new FileReader();
    r.onload=function(){
      try{ var o=JSON.parse(r.result);
        if(o && o.activities && !o.events){ var evs=[]; Object.keys(o.activities).forEach(function(k){ (o.activities[k]||[]).forEach(function(e){ evs.push({id:e.id||uid(),title:e.title,cat:e.cat||'other',start:k,end:k,time:e.time||'',note:e.note||'',done:!!e.done,updatedAt:nowMs()}); }); }); o={version:2,events:evs}; }
        if(!o || !Array.isArray(o.events)) throw 0;
        if(!confirm('Import will MERGE this backup into your plan. Continue?')) return;
        o.events.forEach(function(e){ if(e && !e.updatedAt) e.updatedAt=nowMs(); });
        mergeInto(o.events); saveLocal(); render(); if(modal.classList.contains('open')) renderActList(); schedulePush(); toast('Imported');
      }catch(e){ toast('Invalid backup file'); }
    };
    r.readAsText(file);
  }

  // ---------- wire up ----------
  document.getElementById('prev').addEventListener('click',function(){ viewM--; if(viewM<0){viewM=11;viewY--;} render(); });
  document.getElementById('next').addEventListener('click',function(){ viewM++; if(viewM>11){viewM=0;viewY++;} render(); });
  document.getElementById('today').addEventListener('click',function(){ var t=new Date(); viewY=t.getFullYear(); viewM=t.getMonth(); render(); });
  document.getElementById('close').addEventListener('click',closeDay);
  modal.addEventListener('click',function(e){ if(e.target===modal) closeDay(); });
  document.addEventListener('keydown',function(e){ if(e.key==='Escape' && modal.classList.contains('open')) closeDay(); });
  fSave.addEventListener('click',commit);
  fCancel.addEventListener('click',function(){ resetForm(openKey); });
  fTitle.addEventListener('keydown',function(e){ if(e.key==='Enter'){ e.preventDefault(); commit(); } });
  fStart.addEventListener('change',function(){ if(fEnd.value<fStart.value) fEnd.value=fStart.value; });
  document.getElementById('exportBtn').addEventListener('click',exportData);
  document.getElementById('importBtn').addEventListener('click',function(){ document.getElementById('importFile').click(); });
  document.getElementById('importFile').addEventListener('change',function(e){ if(e.target.files[0]) importData(e.target.files[0]); e.target.value=''; });

  // ---------- boot ----------
  render();
  if(pass){ hideGate(); startSync(); } else { setSync('local'); showGate(''); }
})();
</script>
</body>
</html>
